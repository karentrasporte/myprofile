<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What I'm Learning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9f9f7;
      color: #1a1a1a;
      line-height: 1.7;
    }
    .page { max-width: 680px; margin: 0 auto; padding: 3rem 1.5rem; }
    .back { font-size: 13px; color: #185FA5; text-decoration: none; display: inline-block; margin-bottom: 2rem; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 24px; font-weight: 500; margin-bottom: 0.5rem; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 2.5rem; }
    .post { border-top: 1px solid #e5e5e0; padding: 1.75rem 0; }
    .post:last-child { border-bottom: 1px solid #e5e5e0; }
    .post-date { font-size: 12px; color: #aaa; margin-bottom: 6px; }
    .post h2 { font-size: 17px; font-weight: 500; margin-bottom: 8px; }
    .post p { font-size: 14px; color: #555; }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="/">← Back to profile</a>
    <h1>What I'm learning</h1>
    <p class="subtitle">Notes from my DevOps and Python journey.</p>

    {% for post in posts %}
    <div class="post">
      <div class="post-date">{{ post.date }}</div>
      <h2>{{ post.title }}</h2>
      <p>{{ post.body }}</p>
    </div>
    {% endfor %}

  </div>
</body>
</html>
